# =============================================================================
# Alpaca-Broker – Docker Compose (Collector + API + UI)
# =============================================================================
# Die PostgreSQL-Datenbank läuft als separater Container (postgresql18-alpaca)
# auf dem Unraid-Server und wird NICHT hier verwaltet.
#
# Deployment auf Unraid:
#   1. Repo clonen:  git clone https://github.com/sebastianganser/Alpaca-Broker.git
#   2. .env Datei im Repo-Root ablegen (Vorlage: .env.example)
#   3. Build + Start: docker compose -f infra/docker-compose.yml up --build -d
#
# Für lokale Entwicklung: docker compose -f infra/docker-compose.yml up --build

services:
  alpaca-broker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.collector
    container_name: alpaca-broker
    env_file:
      - ../.env
    environment:
      # Innerhalb von Docker-Netzwerken auf Unraid:
      # DB_HOST wird über .env gesetzt (192.168.1.93)
      TZ: Europe/Berlin
    ports:
      - "8090:8090"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
